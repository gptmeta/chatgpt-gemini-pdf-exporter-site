<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 820" role="img" aria-labelledby="title desc">
  <title id="title">Export workspace product graphic</title>
  <desc id="desc">A stylized browser extension workspace showing AI chat export to PDF and Markdown.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#121827"/>
      <stop offset="0.52" stop-color="#1a2450"/>
      <stop offset="1" stop-color="#273b75"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#edf5ff" stop-opacity="0.88"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#ff7657"/>
      <stop offset="0.48" stop-color="#ffd24c"/>
      <stop offset="1" stop-color="#61e6c7"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="34" stdDeviation="28" flood-color="#060b16" flood-opacity="0.34"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1180" height="820" rx="52" fill="url(#bg)"/>
  <circle cx="1030" cy="110" r="190" fill="#ff7657" opacity="0.22" filter="url(#glow)"/>
  <circle cx="160" cy="710" r="220" fill="#61e6c7" opacity="0.16" filter="url(#glow)"/>
  <path d="M80 164C278 74 428 70 610 138c178 66 332 66 490-20" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

  <g filter="url(#softShadow)">
    <rect x="105" y="86" width="760" height="566" rx="34" fill="url(#panel)"/>
    <rect x="105" y="86" width="760" height="64" rx="34" fill="#f6f9ff"/>
    <circle cx="148" cy="119" r="9" fill="#ff7657"/>
    <circle cx="176" cy="119" r="9" fill="#ffd24c"/>
    <circle cx="204" cy="119" r="9" fill="#61e6c7"/>
    <rect x="248" y="107" width="380" height="24" rx="12" fill="#dbe7f6"/>

    <rect x="144" y="188" width="296" height="92" rx="24" fill="#ffffff" stroke="#dde7f3"/>
    <text x="174" y="226" fill="#172033" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">Prompt</text>
    <text x="174" y="255" fill="#5c6b80" font-family="Segoe UI, Arial, sans-serif" font-size="18">Collect this research thread.</text>

    <rect x="224" y="314" width="580" height="170" rx="28" fill="#111827"/>
    <text x="262" y="360" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="800">Answer</text>
    <rect x="262" y="388" width="452" height="14" rx="7" fill="#d9e5ff" opacity="0.92"/>
    <rect x="262" y="418" width="492" height="14" rx="7" fill="#d9e5ff" opacity="0.7"/>
    <rect x="262" y="448" width="360" height="14" rx="7" fill="#d9e5ff" opacity="0.55"/>

    <rect x="144" y="524" width="660" height="74" rx="24" fill="#f7fbff" stroke="#dde7f3"/>
    <circle cx="185" cy="561" r="17" fill="#61e6c7"/>
    <rect x="220" y="547" width="170" height="12" rx="6" fill="#8797ad"/>
    <rect x="220" y="570" width="310" height="10" rx="5" fill="#cad7e6"/>
    <rect x="650" y="542" width="112" height="38" rx="19" fill="#172033"/>
    <text x="683" y="566" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="800">Export</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="760" y="210" width="300" height="376" rx="34" fill="#ffffff"/>
    <rect x="800" y="250" width="88" height="88" rx="27" fill="#f7fbff" stroke="#d7e2ef"/>
    <circle cx="844" cy="294" r="27" fill="#ffd24c"/>
    <path d="M828 292c7 13 25 13 32 0" fill="none" stroke="#172033" stroke-width="6" stroke-linecap="round"/>
    <circle cx="834" cy="286" r="4" fill="#172033"/>
    <circle cx="854" cy="286" r="4" fill="#172033"/>

    <text x="914" y="280" fill="#172033" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="900">Exporter</text>
    <text x="914" y="309" fill="#5c6b80" font-family="Segoe UI, Arial, sans-serif" font-size="17">PDF and MD</text>

    <rect x="800" y="376" width="220" height="54" rx="20" fill="#172033"/>
    <text x="841" y="411" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="900">Total</text>
    <rect x="800" y="448" width="102" height="54" rx="20" fill="#eff5ff" stroke="#d7e2ef"/>
    <text x="831" y="482" fill="#172033" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="900">Multi</text>
    <rect x="918" y="448" width="102" height="54" rx="20" fill="#eff5ff" stroke="#d7e2ef"/>
    <text x="944" y="482" fill="#172033" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="900">Select</text>
    <rect x="800" y="522" width="220" height="20" rx="10" fill="url(#accent)"/>
  </g>

  <g>
    <path d="M526 660c144 82 328 82 464 4" fill="none" stroke="url(#accent)" stroke-width="10" stroke-linecap="round"/>
    <circle cx="520" cy="656" r="18" fill="#ff7657"/>
    <circle cx="760" cy="710" r="18" fill="#ffd24c"/>
    <circle cx="996" cy="660" r="18" fill="#61e6c7"/>
    <text x="458" y="726" fill="#ffffff" opacity="0.82" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">Chat</text>
    <text x="723" y="765" fill="#ffffff" opacity="0.82" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">Clean document</text>
    <text x="966" y="726" fill="#ffffff" opacity="0.82" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">PDF / MD</text>
  </g>
</svg>
